name: Auto Issue Comment

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to label with claude (re-trigger)'
        required: true
        type: number

jobs:
  trigger-claude-on-open:
    if: |
      github.event_name == 'issues' &&
      github.event.action == 'opened' &&
      !contains(toJSON(github.event.issue.labels), 'claude')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Add claude label on new issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const labels = context.payload.issue.labels.map(l => l.name);
            if (labels.includes('claude')) {
              console.log('Issue already has claude label, skipping');
              return;
            }
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['claude']
            });
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🤖 Auto-triaging with Claude. Analyzing issue and implementing a fix...\n\nClaude will:\n1. Classify this issue\n2. Search codebase for root cause\n3. Implement a minimal fix following AGENTS.md\n4. Create a PR with the changes'
            });

  trigger-claude-dispatch:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Add claude label (manual dispatch)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const n = ${{ inputs.issue_number }};
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: n
            });
            const labels = (issue.labels || []).map(l => (typeof l === 'string' ? l : l.name));
            if (labels.includes('claude')) {
              console.log('Issue already has claude label');
              return;
            }
            await github.rest.issues.addLabels({
              issue_number: n,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['claude']
            });
