name: Claude Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [assigned, labeled, opened]
  pull_request_review:
    types: [submitted]

jobs:
  # ================================================================
  # Job 1: Lightweight triage for ALL new issues (including external users)
  # Posts welcome comment + adds triage labels. No Claude code execution.
  # ================================================================
  issue-triage:
    if: |
      github.event_name == 'issues' &&
      github.event.action == 'opened' &&
      !contains(toJSON(github.event.issue.labels), 'claude')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_APP_ID }}
          private-key: ${{ secrets.CLAUDE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Triage and acknowledge issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const issue = context.payload.issue;
            const title = (issue.title || '').toLowerCase();
            const body = (issue.body || '').toLowerCase();
            const content = title + ' ' + body;
            const isOwner = ['OWNER', 'MEMBER', 'COLLABORATOR'].includes(
              issue.author_association
            );

            // --- Label triage ---
            const labels = [];

            // Kind labels
            if (content.includes('feature request') || content.includes('[feature')) {
              labels.push('enhancement');
            } else if (content.includes('bug') || content.includes('error') || content.includes('crash') || content.includes('traceback')) {
              labels.push('bug');
            } else if (content.includes('question') || content.includes('how do i') || content.includes('how to')) {
              labels.push('question');
            }

            // Area labels
            if (content.includes('security') || content.includes('cve') || content.includes('vulnerability')) {
              labels.push('security');
            }
            if (content.includes('performance') || content.includes('slow') || content.includes('memory leak')) {
              labels.push('performance');
            }
            if (content.includes('documentation') || content.includes('docs')) {
              labels.push('documentation');
            }
            if (content.includes('typescript') || content.includes('javascript') || content.includes('npm')) {
              labels.push('javascript');
            }

            // Apply labels
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                issue_number: issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels
              });
            }

            // --- Acknowledgment comment (external users only) ---
            if (!isOwner) {
              await github.rest.issues.createComment({
                issue_number: issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: [
                  `👋 Thanks for opening this issue, @${issue.user.login}!`,
                  '',
                  'A maintainer will review this shortly. In the meantime:',
                  '- Make sure you\'ve included steps to reproduce (for bugs)',
                  `- Check [existing issues](https://github.com/${context.repo.owner}/${context.repo.repo}/issues) for duplicates`,
                  '- Review the [documentation](https://praison.ai/docs) for related guides',
                  '',
                  '_A maintainer can trigger deeper analysis by commenting `@claude` on this issue._'
                ].join('\n')
              });
            }

            // Owner/collaborator: add claude label via App token so issues:labeled triggers claude-response
            if (isOwner) {
              await github.rest.issues.addLabels({
                issue_number: issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['claude']
              });
              await github.rest.issues.createComment({
                issue_number: issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '🤖 Auto-triaging with Claude. Analysing issue and implementing a fix...\n\nClaude will:\n1. Read AGENTS.md and the SDK source\n2. Create or update documentation on a `claude/issue-*` branch\n3. Push and open a PR automatically (`Fixes #<issue>`)\n\nIf the PR is missing after Claude finishes, CI will open it within ~30 minutes.'
              });
            }

  # ================================================================
  # Job 2: Full Claude docs-fix
  # Triggers on: issues labeled `claude`, @claude issue comments, PR review threads, PR reviews
  # ================================================================
  claude-response:
    # Runs on: issues labeled "claude", @claude comments, PR review comments, PR reviews — not on opened/assigned/other labels
    env:
      ISSUE_NUMBER_RESOLVED: ${{ github.event.issue.number || github.event.pull_request.number }}
    if: |
      github.event.action != 'opened' &&
      (github.event_name != 'issues' || (github.event.action == 'labeled' && github.event.label.name == 'claude')) &&
      (github.event_name != 'issue_comment' || contains(github.event.comment.body, '@claude')) &&
      (github.event_name != 'pull_request_review' || contains(github.event.review.body, '@claude')) &&
      (github.event_name != 'pull_request_review_comment' || contains(github.event.comment.body, '@claude')) &&
      (
        !contains(github.actor, '[bot]') ||
        github.actor == 'github-actions[bot]' ||
        github.actor == 'praisonai-triage-agent[bot]'
      ) &&
      github.actor != 'dependabot[bot]' &&
      github.actor != 'cursor[bot]' &&
      github.actor != 'renovate[bot]'
    concurrency:
      group: claude-response-${{ github.repository }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_APP_ID }}
          private-key: ${{ secrets.CLAUDE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Check PR context (fork / merge state)
        id: check_fork
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const isPR = context.eventName === 'pull_request'
              || context.eventName === 'pull_request_review'
              || context.eventName === 'pull_request_review_comment'
              || (context.payload.issue && context.payload.issue.pull_request);

            if (!isPR) {
              core.setOutput('is_pr', 'false');
              core.setOutput('is_fork', 'false');
              core.setOutput('can_push_fork', 'false');
              return;
            }

            const prNumber = context.payload.pull_request
              ? context.payload.pull_request.number
              : context.payload.issue.number;
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            let mergeState = '';
            try {
              const gql = await github.graphql(
                `query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) { mergeStateStatus }
                  }
                }`,
                { owner: context.repo.owner, repo: context.repo.repo, number: prNumber }
              );
              mergeState = (gql.repository.pullRequest.mergeStateStatus || '').toUpperCase();
            } catch (e) {
              core.warning(`GraphQL mergeStateStatus failed: ${e.message}`);
            }
            if (!mergeState) {
              mergeState = (pr.data.mergeable_state || pr.data.merge_state_status || '').toUpperCase();
            }

            core.setOutput('is_pr', 'true');
            core.setOutput('pr_number', String(prNumber));
            core.setOutput('pr_branch', pr.data.head.ref);
            core.setOutput('head_repo', pr.data.head.repo.full_name);
            core.setOutput('merge_state', mergeState);

            const baseRepo = `${context.repo.owner}/${context.repo.repo}`;
            const maintainerCanModify = pr.data.maintainer_can_modify === true;
            if (pr.data.head.repo && pr.data.head.repo.full_name !== baseRepo) {
              core.setOutput('is_fork', 'true');
              core.setOutput('can_push_fork', String(maintainerCanModify));
              core.setOutput('fork_repo', pr.data.head.repo.full_name);
              return;
            }
            core.setOutput('is_fork', 'false');
            core.setOutput('can_push_fork', 'false');

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      - name: Fetch PR branch and setup remote
        if: steps.check_fork.outputs.is_pr == 'true'
        env:
          PR_BRANCH: ${{ steps.check_fork.outputs.pr_branch }}
          PR_NUMBER: ${{ steps.check_fork.outputs.pr_number }}
          IS_FORK: ${{ steps.check_fork.outputs.is_fork }}
          CAN_PUSH_FORK: ${{ steps.check_fork.outputs.can_push_fork }}
          FORK_REPO: ${{ steps.check_fork.outputs.fork_repo }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git fetch origin "pull/${PR_NUMBER}/head:${PR_BRANCH}"
          git checkout "${PR_BRANCH}"
          git fetch origin main
          if [ "${IS_FORK}" = "true" ] && [ "${CAN_PUSH_FORK}" = "true" ]; then
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${FORK_REPO}.git"
          elif [ "${IS_FORK}" = "true" ]; then
            git remote set-url origin "file://$(pwd)"
          fi

      - uses: anthropics/claude-code-action@beta
        env:
          GH_TOKEN: ${{ steps.check_fork.outputs.can_push_fork == 'true' && secrets.GH_TOKEN || steps.app-token.outputs.token }}
        with:
          allowed_bots: 'praisonai-triage-agent[bot]'
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          model: claude-opus-4-8
          trigger_phrase: "@claude"
          label_trigger: "claude"

          direct_prompt: |
            You are a documentation engineer for PraisonAI. This is a DOCUMENTATION repository.
            Follow AGENTS.md strictly — it contains the exact page structure, Mintlify components,
            Mermaid diagram standards, and code example rules you MUST follow.

            ${{ steps.check_fork.outputs.is_fork == 'true' && steps.check_fork.outputs.can_push_fork != 'true' && 'CRITICAL: THIS IS A PULL REQUEST FROM A FORK WITHOUT MAINTAINER EDITS. YOU DO NOT HAVE PUSH PERMISSIONS. ONLY READ FILES, VALIDATE DOCS, AND PROVIDE COMMENTS ON THIS PR. DO NOT ATTEMPT TO PUSH OR CREATE PULL REQUESTS.\n\n' || (steps.check_fork.outputs.can_push_fork == 'true' && format('NOTE: Fork PR with maintainer edits allowed. Push directly to fork {0} branch {1}.\n\n', steps.check_fork.outputs.fork_repo, steps.check_fork.outputs.pr_branch) || (steps.check_fork.outputs.is_pr == 'true' && steps.check_fork.outputs.is_fork != 'true' && 'NOTE: The branch is under MervinPraison/PraisonAIDocs (not a fork). You are able to make modifications and push directly to this branch.\n\n' || (steps.check_fork.outputs.is_pr != 'true' && 'NOTE: This is an issue (not a PR). Create a new fix branch per STEP 4 below.\n\n' || ''))) }}
            ${{ steps.check_fork.outputs.is_pr == 'true' && format('CONTEXT: PR #{0} on branch {1}. head.repo={2}, is_fork={3}, can_push_fork={4}, merge_state={5}.\n\n', steps.check_fork.outputs.pr_number, steps.check_fork.outputs.pr_branch, steps.check_fork.outputs.head_repo, steps.check_fork.outputs.is_fork, steps.check_fork.outputs.can_push_fork, steps.check_fork.outputs.merge_state) || '' }}

            STEP 0 — SETUP GIT IDENTITY & AUTH:
            git config --global user.name "MervinPraison"
            git config --global user.email "454862+MervinPraison@users.noreply.github.com"
            gh auth setup-git

            STEP 1 — READ AGENTS.md:
            Read AGENTS.md completely. It defines:
            - Page structure template (Section 2)
            - Mermaid diagram color scheme: #8B0000 dark red, #189AB4 teal, #fff white text (Section 3)
            - Mintlify components: Steps, AccordionGroup, CardGroup, Tabs, CodeGroup (Section 4)
            - Code example standards: copy-paste runnable, minimal, agent-centric (Section 5)
            - Writing style: concise, active voice, no forbidden phrases (Section 6)
            - Quality checklist (Section 9)
            Every documentation page you create MUST pass the quality checklist.

            FOLDER RULES (CRITICAL — NEVER VIOLATE):
            - NEVER create or modify pages in docs/concepts/ — that folder is HUMAN-APPROVED ONLY
            - Always place new documentation pages in docs/features/ instead
            - If the issue mentions "concepts", still place the file in docs/features/
            - Update docs.json to add new pages under the "Features" group, NOT "Concepts"
            - Existing docs/concepts/ pages must NOT be touched without explicit human approval

            ${{ steps.check_fork.outputs.is_pr == 'true' && (steps.check_fork.outputs.is_fork != 'true' || steps.check_fork.outputs.can_push_fork == 'true') && steps.check_fork.outputs.merge_state == 'DIRTY' && format('STEP 2 — RESOLVE MERGE CONFLICTS ON PR (branch: {0}, PR #{1}{2}):\n- DO NOT create a new branch or PR\n- git fetch origin main && git rebase origin/main\n- Resolve conflicts: keep this PR doc intent, merge in newer main logic\n- For docs.json: combine nav entries from both sides; never leave conflict markers\n- git add -A && git rebase --continue (repeat until done)\n- git push --force-with-lease origin {0}\n- Verify docs.json is valid JSON and Mintlify paths exist\n- Comment which files you resolved\n', steps.check_fork.outputs.pr_branch, steps.check_fork.outputs.pr_number, steps.check_fork.outputs.can_push_fork == 'true' && format(', fork: {0}', steps.check_fork.outputs.fork_repo) || '') || '' }}
            ${{ steps.check_fork.outputs.is_pr == 'true' && (steps.check_fork.outputs.is_fork != 'true' || steps.check_fork.outputs.can_push_fork == 'true') && steps.check_fork.outputs.merge_state != 'DIRTY' && format('STEP 2 — IMPLEMENT ON EXISTING PR (branch: {0}, PR #{1}{2}):\n- DO NOT create a new branch or PR\n- git checkout {0}\n- SCOPE: docs/, docs.json, mint.json only — documentation changes\n- Read ./praisonaiagents/, ./praisonai/, ./praisonai_code/, and ./praisonai_bot/ synced source before editing\n- Apply reviewer feedback or fix valid doc issues from comments above\n- git add -A && git commit -m "docs: <description>"\n- git push origin {0}\n- Comment a summary of exact files modified and what you skipped\n', steps.check_fork.outputs.pr_branch, steps.check_fork.outputs.pr_number, steps.check_fork.outputs.can_push_fork == 'true' && format(', fork: {0}', steps.check_fork.outputs.fork_repo) || '') || '' }}
            ${{ steps.check_fork.outputs.is_pr != 'true' && 'STEP 2 — UNDERSTAND THE ISSUE:
            Read the issue title, body, and all comments carefully.
            Determine what documentation needs to be created or updated.

            STEP 3 — READ SDK SOURCE:
            Read ./praisonaiagents/, ./praisonai/, ./praisonai_code/, and ./praisonai_bot/ first (AGENTS.md section 1.4). Extract signatures,
            defaults, feature_configs.py, imports. If missing, clone: gh repo clone MervinPraison/PraisonAI /tmp/PraisonAI --depth=1
            NEVER guess — read the code.

            STEP 4 — BRANCH, IMPLEMENT, COMMIT, PUSH, OPEN PR (mandatory — do not defer):
            - Set BRANCH once: BRANCH="claude/issue-$ISSUE_NUMBER-$(date +%Y%m%d-%H%M)" then git checkout -b "$BRANCH"
            - Place ALL new .mdx files in docs/features/ (NEVER docs/concepts/)
            - Follow the page structure template in AGENTS.md Section 2
            - Start every page with an agent-centric Quick Start example
            - Use Mintlify components (Steps, AccordionGroup, CardGroup, Tabs)
            - Include Mermaid diagrams with the standard colour scheme
            - All code examples must be copy-paste runnable with correct imports
            - If creating new pages, add them to docs.json in the correct section
            - Verify docs.json is valid JSON and all .mdx files exist
            - git add -A && git commit -m "docs: <description> (fixes #$ISSUE_NUMBER)"
            - git push -u origin "$BRANCH"
            CRITICAL: Immediately after push, run exactly:
            gh pr create --base main --head "$BRANCH" --title "docs: <title>" --body "Fixes #$ISSUE_NUMBER"
            Do NOT use --draft. Create a normal ready-for-review PR (draft PRs are skipped by the merge gate).
            Do NOT stop after push. Do NOT ask a human to open a PR. Do NOT finish until gh pr create returns a PR URL.
            If gh pr create fails, read the error, fix (auth, duplicate PR, wrong head), and retry until it succeeds.
            Reuse the same $BRANCH for any follow-up commits — never create a second branch with a new date.

            STEP 5 — FOLLOW-UP (only if reviewers request changes on the open PR):
            - git checkout "$BRANCH"
            - Apply fixes, commit, push to the same branch
            - Do NOT run gh pr create again if a PR already exists for $BRANCH
            ' || '' }}
          allowed_tools: |
            Bash(git:*)
            Bash(python:*)
            Bash(pip:*)
            Bash(conda:*)
            Bash(pytest:*)
            Bash(gh:*)
            Bash(python -m pytest:*)
            Bash(python -m pip:*)
            Bash(poetry:*)
            View
            GlobTool
            GrepTool
            BatchTool
            Edit
            Replace
            mcp__github__get_issue
            mcp__github__get_issue_comments
            mcp__github__update_issue
          timeout_minutes: 30

      - name: Ensure open PR for issue branch
        if: |
          (github.event_name == 'issues' && github.event.action == 'labeled') ||
          (github.event_name == 'issue_comment' && !github.event.issue.pull_request)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const path = require('path');
            const orphan = require(path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/orphan-pr.js'));
            const issueNumber = context.payload.issue.number;
            await orphan.ensureOpenPrForIssue(
              github, context.repo.owner, context.repo.repo, issueNumber, core
            );

      - name: Kick review chain for new PR
        if: |
          (github.event_name == 'issues' && github.event.action == 'labeled') ||
          (github.event_name == 'issue_comment' && !github.event.issue.pull_request)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const path = require('path');
            const chain = require(path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/bot-pr-review-chain.js'));
            const issueNumber = context.payload.issue.number;
            await chain.kickReviewChainForIssue(
              github, context.repo.owner, context.repo.repo, issueNumber, core
            );

      - name: Sync pipeline status labels
        if: |
          (github.event_name == 'issue_comment' && github.event.issue.pull_request) ||
          github.event_name == 'pull_request_review' ||
          github.event_name == 'pull_request_review_comment'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const path = require('path');
            const ps = require(path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/pipeline-status.js'));
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request?.number || context.payload.issue?.number;
            if (!prNumber) return;
            await ps.ensurePipelineLabels(github, owner, repo, core);
            await ps.syncPipelineLabels(github, owner, repo, prNumber, core);

      - name: Dispatch merge gate when PR pipeline ready
        if: |
          (github.event_name == 'issue_comment' && github.event.issue.pull_request) ||
          github.event_name == 'pull_request_review' ||
          github.event_name == 'pull_request_review_comment'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const path = require('path');
            const mergeGate = require(path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/merge-gate.js'));
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request?.number || context.payload.issue?.number;
            if (!prNumber) return;
            const check = await mergeGate.evaluatePipelineQuiescent(
              github, owner, repo, prNumber, core, {
                skipGlobalClaudeRunCheck: true,
                skipRecentClaudeCooldown: true,
              }
            );
            if (!check.ready) {
              core.info(`PR #${prNumber} not ready for merge gate: ${check.reasons.join(', ')}`);
              return;
            }
            await github.rest.repos.createDispatchEvent({
              owner,
              repo,
              event_type: 'claude-merge-gate',
              client_payload: { pr_number: prNumber },
            });
            core.info(`Dispatched merge gate for PR #${prNumber}`);
