name: Pipeline GitHub token
description: >-
  GitHub App installation token for pipeline jobs (separate REST rate limit from user PAT).
  Falls back to GH_TOKEN secret, then GITHUB_TOKEN.

inputs:
  app-id:
    description: GitHub App ID (CLAUDE_APP_ID)
    required: false
    default: ''
  private-key:
    description: GitHub App private key
    required: false
    default: ''
  fallback-token:
    description: Optional PAT fallback (secrets.GH_TOKEN)
    required: false
    default: ''

outputs:
  token:
    description: Token for github-script / gh / git push
    value: ${{ steps.pick.outputs.token }}

runs:
  using: composite
  steps:
    - uses: actions/create-github-app-token@v1
      id: app-token
      if: inputs.app-id != '' && inputs.private-key != ''
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}
        owner: ${{ github.repository_owner }}

    - id: pick
      shell: bash
      run: |
        if [ -n "${{ steps.app-token.outputs.token }}" ]; then
          echo "token=${{ steps.app-token.outputs.token }}" >> "$GITHUB_OUTPUT"
          echo "Using GitHub App installation token for pipeline API calls"
        elif [ -n "${{ inputs.fallback-token }}" ]; then
          echo "token=${{ inputs.fallback-token }}" >> "$GITHUB_OUTPUT"
          echo "Using GH_TOKEN PAT fallback for pipeline API calls"
        else
          echo "token=${{ github.token }}" >> "$GITHUB_OUTPUT"
          echo "Using default GITHUB_TOKEN for pipeline API calls"
        fi
